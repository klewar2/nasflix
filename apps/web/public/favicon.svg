<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#000"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#b0060f"/>
    </linearGradient>
  </defs>
  <!-- Barre gauche -->
  <rect x="8" y="6" width="12" height="52" fill="url(#g)"/>
  <!-- Barre droite -->
  <rect x="44" y="6" width="12" height="52" fill="url(#g)"/>
  <!-- Diagonale haut-droite de la barre gauche → bas-gauche de la barre droite -->
  <polygon points="20,6 32,6 44,58 32,58" fill="url(#g)"/>
</svg>
