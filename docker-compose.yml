services:
  postgres:
    image: postgres:16-alpine
    container_name: nasflix-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: netflix
      POSTGRES_PASSWORD: netflix_dev
      POSTGRES_DB: nasflix
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
